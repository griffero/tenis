# Render Blueprint — Tenis Championship
# Docs: https://render.com/docs/blueprint-spec
#
# Plan rationale:
#   web (starter):           always-on (free plan spins down and breaks the
#                             magic-link login flow). 512 MB RAM is plenty for
#                             Next.js in production mode.
#   postgres (basic-256mb):  replacement for the legacy 'starter' plan (no
#                             longer offered for new databases). Persistent,
#                             256 MB RAM, 1 GB disk — enough for a monthly
#                             tournament with dozens of players and matches.
# Approximate cost: ~USD 13/month (7 web + 6 DB). To scale, upgrade the web
# plan first.
#
# Build command note: `--include=dev` is required because NODE_ENV=production
# makes `npm ci` skip devDependencies, and the Next.js build needs tailwindcss,
# postcss, autoprefixer, typescript and prisma at build time.

services:
  - type: web
    name: tenis-web
    runtime: node
    plan: starter
    region: oregon
    branch: main
    buildCommand: npm ci --include=dev --no-audit --no-fund && npm run build
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_URL
        sync: false # set to the public service URL (e.g. https://tenis-web.onrender.com)
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false # e.g. "Tenis <no-reply@yourdomain.com>"
      - key: DATABASE_URL
        fromDatabase:
          name: tenis-db
          property: connectionString

databases:
  - name: tenis-db
    plan: basic-256mb
    region: oregon
    databaseName: tenis
    user: tenis
    # Automatic retention and backups are included in the basic-256mb plan.
    ipAllowList: [] # internal access only from the web service
